included:
  - Sources
  - Tests

excluded:
  - .build
  - build
  - usb-boop.xcodeproj

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - closure_spacing
  - empty_count
  - force_unwrapping
  - implicitly_unwrapped_optional
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - i

nesting:
  type_level: 2
  function_level: 3
