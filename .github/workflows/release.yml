name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    if: github.actor != 'github-actions[bot]' || !startsWith(github.ref, 'refs/tags/')
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      released: ${{ steps.version.outputs.skip != 'true' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          # Pin to a known-good version for build reproducibility
          brew install xcodegen
          xcodegen --version

      - name: Determine version
        id: version
        # SECURITY: Commit message MUST be passed via env to prevent shell injection.
        # Never use ${{ github.event.head_commit.message }} directly in a run: block.
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "created_new=false" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$HEAD_MESSAGE" | head -1 | grep -qE '^(docs|ci|chore|test|style)(\(.+\))?:'; then
            echo "Non-release commit type. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < <(./scripts/next_calver.sh)

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.created_new == 'true' && !startsWith(github.ref, 'refs/tags/')
        env:
          NEW_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Run tests
        if: steps.version.outputs.skip != 'true'
        run: |
          xcodegen generate
          xcodebuild \
            -project usb-boop.xcodeproj \
            -scheme usb-boop \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build release artifact
        if: steps.version.outputs.skip != 'true'
        run: |
          mkdir -p dist
          ./scripts/build_release_zip.sh "${{ steps.version.outputs.version }}" dist

      - name: Create release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/usb-boop-macos-arm64.zip
            dist/usb-boop-macos-arm64.sha256
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: release
    if: needs.release.outputs.released == 'true'
    environment: action-runners

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_SECRET }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap

      - name: Get GitHub App user ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: gh release download "$TAG" --repo "${{ github.repository }}" --pattern 'usb-boop-macos-arm64.zip' --dir assets

      - name: Verify artifact integrity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'usb-boop-macos-arm64.sha256' \
            --dir assets
          cd assets && sha256sum -c usb-boop-macos-arm64.sha256

      - name: Compute SHA256 checksum
        id: sha
        run: echo "archive=$(sha256sum assets/usb-boop-macos-arm64.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Check out usb-boop
        uses: actions/checkout@v4

      - name: Check out homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Strip version prefix
        id: ver
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update cask
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA_ARCHIVE: ${{ steps.sha.outputs.archive }}
        run: |
          ./scripts/update_homebrew_tap.sh \
            homebrew-tap \
            "${VERSION}" \
            "${SHA_ARCHIVE}" \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/usb-boop-macos-arm64.zip"

      - name: Update README
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          TABLE=$'| Formula | Version | Description |\n|---------|---------|-------------|'
          if [ -d homebrew-tap/Formula ]; then
            for rb in homebrew-tap/Formula/*.rb; do
              [ -e "$rb" ] || continue
              name=$(basename "$rb" .rb)
              ver=$(grep -m1 'version "' "$rb" | sed 's/.*version "//;s/".*//')
              desc=$(grep -m1 'desc "' "$rb" | sed 's/.*desc "//;s/".*//')
              TABLE="${TABLE}"$'\n'"| [${name}](https://github.com/${OWNER}/${name}) | ${ver} | ${desc} |"
            done
          fi
          if [ -d homebrew-tap/Casks ]; then
            for rb in homebrew-tap/Casks/*.rb; do
              [ -e "$rb" ] || continue
              name=$(basename "$rb" .rb)
              ver=$(grep -m1 'version "' "$rb" | sed 's/.*version "//;s/".*//')
              desc=$(grep -m1 'desc "' "$rb" | sed 's/.*desc "//;s/".*//')
              TABLE="${TABLE}"$'\n'"| [${name}](https://github.com/${OWNER}/${name}) | ${ver} | ${desc} (cask) |"
            done
          fi

          INSTALL=$'```bash\n'
          if [ -d homebrew-tap/Formula ]; then
            for rb in homebrew-tap/Formula/*.rb; do
              [ -e "$rb" ] || continue
              name=$(basename "$rb" .rb)
              INSTALL="${INSTALL}brew install ${OWNER}/tap/${name}"$'\n'
            done
          fi
          if [ -d homebrew-tap/Casks ]; then
            for rb in homebrew-tap/Casks/*.rb; do
              [ -e "$rb" ] || continue
              name=$(basename "$rb" .rb)
              INSTALL="${INSTALL}brew install --cask ${OWNER}/tap/${name}"$'\n'
            done
          fi
          INSTALL="${INSTALL}"$'```\n'

          awk -v table="$TABLE" -v install="$INSTALL" '
            /<!-- BEGIN FORMULAE -->/ { print; printf "%s\n", table; skip=1; next }
            /<!-- END FORMULAE -->/ { skip=0 }
            skip { next }
            /<!-- BEGIN INSTALL -->/ { print; printf "%s\n", install; skip2=1; next }
            /<!-- END INSTALL -->/ { skip2=0 }
            skip2 { next }
            { print }
          ' homebrew-tap/README.md > homebrew-tap/README.tmp && mv homebrew-tap/README.tmp homebrew-tap/README.md

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          USER_ID: ${{ steps.get-user-id.outputs.user-id }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add Casks/usb-boop.rb README.md
          git diff --staged --quiet || {
            git commit -m "chore: update usb-boop to ${VERSION}"
            git push
          }
