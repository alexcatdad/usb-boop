name: usb-boop

options:
  minimumXcodeGenVersion: 2.45.0
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    SUPPORTED_PLATFORMS: macosx
    SDKROOT: macosx
    ARCHS: arm64
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES

targets:
  USBBoopKit:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/USBBoopKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexcatdad.usb-boop.kit
        PRODUCT_NAME: USBBoopKit
        GENERATE_INFOPLIST_FILE: YES

  usb-boop:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/App
      - path: Sources/App/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - target: USBBoopKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexcatdad.usb-boop
        PRODUCT_NAME: usb-boop
        PRODUCT_MODULE_NAME: USBBoopApp
        INFOPLIST_FILE: Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 0.0.0-dev
        CURRENT_PROJECT_VERSION: 1

  USBBoopKitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/USBBoopKitTests
    dependencies:
      - target: USBBoopKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  USBBoopAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/USBBoopAppTests
      - path: Sources/App
        includes:
          - "*.swift"
        excludes:
          - USBBoopApp.swift
    dependencies:
      - target: USBBoopKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  usb-boop:
    build:
      targets:
        usb-boop: all
        USBBoopKit: all
    test:
      targets:
        - USBBoopKitTests
        - USBBoopAppTests
